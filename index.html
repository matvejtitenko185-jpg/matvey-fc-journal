<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATVEY FC</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap');

:root {
  --green: #1a7a3c;
  --green-bright: #22c55e;
  --green-dark: #0d4a24;
  --white: #f0f4f0;
  --gold: #f5c518;
  --gray: #1c1c1c;
  --gray-mid: #2a2a2a;
  --red: #e63946;
  --muted: #888;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }

body {
  background: #0e0e0e;
  color: var(--white);
  font-family: 'Oswald', sans-serif;
  min-height: 100%;
  min-height: 100dvh;
  -webkit-text-size-adjust: 100%;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.012) 40px, rgba(255,255,255,0.012) 80px);
  pointer-events: none;
  z-index: 0;
}

.wrap {
  max-width: 520px;
  margin: 0 auto;
  padding: 0 12px 40px;
  position: relative;
  z-index: 1;
  min-height: 100vh;
}
@media (max-width: 540px) {
  .wrap { max-width: 100%; padding: 0 10px 32px; }
  .card { border-left: none; border-right: none; margin-left: -10px; margin-right: -10px; padding: 16px 14px; }
  .hdr { padding: 20px 0 14px; }
  .hdr h1 { font-size: 48px; }
  .stats { gap: 6px; }
  .tgrid { gap: 6px; }
  .agrid { gap: 6px; }
  .entry { margin-left: -10px; margin-right: -10px; border-left: 3px solid var(--green); border-right: none; }
}

.hdr { text-align: center; padding: 28px 0 20px; }
.hdr-badge {
  display: inline-block;
  background: var(--green-dark);
  border: 1px solid var(--green);
  color: var(--green-bright);
  font-size: 10px;
  letter-spacing: 4px;
  padding: 4px 12px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.hdr h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  letter-spacing: 4px;
  line-height: 1;
  background: linear-gradient(135deg, var(--white) 0%, var(--green-bright) 50%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hdr-sub { font-size: 11px; letter-spacing: 6px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
.divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; }
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--green)); }
.divider::after { background: linear-gradient(to left, transparent, var(--green)); }

.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.stat { background: var(--gray-mid); border: 1px solid #333; border-top: 2px solid var(--green); padding: 12px; text-align: center; }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 30px; color: var(--green-bright); line-height: 1; }
.stat-val.gold { color: var(--gold); font-size: 22px; }
.stat-val.wht  { color: var(--white); font-size: 24px; }
.stat-lbl { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }

.tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid #333; margin-bottom: 16px; overflow: hidden; }
.tab {
  background: var(--gray);
  border: none;
  border-right: 1px solid #333;
  color: var(--muted);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 2px;
  padding: 16px 4px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.tab:last-child { border-right: none; }
.tab:hover { background: var(--gray-mid); color: var(--white); }
.tab.on { background: var(--green-dark); color: var(--green-bright); border-bottom: 2px solid var(--green-bright); }

.card { background: var(--gray-mid); border: 1px solid #333; padding: 20px; margin-bottom: 16px; }

.slabel {
  font-size: 11px; letter-spacing: 4px; color: var(--green-bright);
  text-transform: uppercase; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.slabel::after { content: ''; flex: 1; height: 1px; background: #333; }

.tgrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
.tbtn {
  background: var(--gray);
  border: 2px solid #333;
  color: var(--muted);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  height: 58px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
.tbtn:hover { border-color: var(--green); color: var(--white); background: var(--green-dark); }
.tbtn.on { background: var(--green-dark); border-color: var(--green-bright); color: var(--green-bright); box-shadow: 0 0 14px rgba(34,197,94,0.2); }
.tbtn.on::after { content: '✓'; position: absolute; top: 4px; right: 6px; font-size: 10px; font-family: 'Inter', sans-serif; }

.drow { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; }
.dinput {
  background: var(--gray);
  border: 2px solid #333;
  color: var(--white);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  padding: 12px 0;
  text-align: center;
  width: 72px;
  outline: none;
  -moz-appearance: textfield;
  transition: border-color 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.dinput::-webkit-inner-spin-button, .dinput::-webkit-outer-spin-button { -webkit-appearance: none; }
.dinput:focus { border-color: var(--green-bright); }
.dinput::placeholder { color: #444; font-size: 16px; }
.dsep { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--muted); }

.agrid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
.abtn {
  background: var(--gray);
  border: 2px solid #333;
  color: var(--muted);
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  font-weight: 500;
  height: 50px;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.abtn:hover { border-color: var(--gold); color: var(--white); }
.abtn.on { background: rgba(245,197,24,0.15); border-color: var(--gold); color: var(--gold); }
.acnt { position: absolute; top: 3px; right: 5px; font-family: 'Bebas Neue', sans-serif; font-size: 11px; color: var(--gold); }

.mrow { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
.minput {
  flex: 1;
  background: var(--gray);
  border: 2px solid #333;
  color: var(--white);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.15s;
  -moz-appearance: textfield;
}
.minput::-webkit-inner-spin-button, .minput::-webkit-outer-spin-button { -webkit-appearance: none; }
.minput:focus { border-color: var(--green-bright); }
.minput::placeholder { color: #444; font-size: 14px; }
.madd {
  background: var(--green-dark);
  border: 2px solid var(--green);
  color: var(--green-bright);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 2px;
  padding: 0 14px;
  height: 46px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.madd:hover { background: var(--green); }

.atotal {
  text-align: right;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 17px;
  color: var(--gold);
  letter-spacing: 2px;
  min-height: 24px;
  margin-bottom: 14px;
}
.atotal button {
  background: none;
  border: 1px solid #444;
  color: var(--muted);
  font-family: 'Oswald', sans-serif;
  font-size: 10px;
  letter-spacing: 2px;
  padding: 2px 8px;
  cursor: pointer;
  margin-left: 10px;
  vertical-align: middle;
}
.atotal button:hover { border-color: var(--red); color: var(--red); }

.ninput {
  width: 100%;
  background: var(--gray);
  border: 2px solid #333;
  color: var(--white);
  font-family: 'Oswald', sans-serif;
  font-size: 15px;
  padding: 10px 14px;
  outline: none;
  margin-bottom: 18px;
  transition: border-color 0.15s;
}
.ninput:focus { border-color: var(--green-bright); }
.ninput::placeholder { color: #444; }

.sbtn {
  width: 100%;
  background: var(--green);
  border: none;
  color: var(--white);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 4px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.sbtn:hover { background: var(--green-bright); color: #000; }
.sbtn:active { transform: scale(0.99); }

.crow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.clbl { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; white-space: nowrap; }

.range-result { display: none; margin-top: 16px; border-top: 1px solid #333; padding-top: 14px; }
.range-period { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
.range-row { display: flex; justify-content: space-between; align-items: flex-end; }
.range-sum { font-family: 'Bebas Neue', sans-serif; font-size: 44px; color: var(--gold); line-height: 1; }
.range-meta { text-align: right; }
.range-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--green-bright); }
.range-num.wht { color: var(--white); margin-top: 4px; }
.range-lbl { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }

.entry {
  background: var(--gray-mid);
  border: 1px solid #2a2a2a;
  border-left: 3px solid var(--green);
  padding: 14px 16px;
  margin-bottom: 8px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
  animation: fadeIn 0.25s ease;
}
@keyframes fadeIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; transform:none; } }
.entry-date { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
.entry-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 4px; }
.etag {
  background: var(--green-dark);
  border: 1px solid var(--green);
  color: var(--green-bright);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
}
.entry-note { font-size: 12px; color: var(--muted); font-family: 'Inter', sans-serif; margin-top: 3px; }
.entry-amt { font-family: 'Bebas Neue', sans-serif; font-size: 26px; color: var(--gold); line-height: 1; text-align: right; }
.entry-aml { font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; text-align: right; }

.empty { text-align: center; padding: 40px 20px; color: var(--muted); border: 1px dashed #2a2a2a; }
.empty-ico { font-size: 36px; margin-bottom: 10px; }
.empty-txt { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }

.clrbtn {
  background: none;
  border: 1px solid #333;
  color: var(--muted);
  font-family: 'Oswald', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  padding: 8px 20px;
  cursor: pointer;
  text-transform: uppercase;
  display: block;
  margin: 16px auto 0;
  transition: all 0.15s;
}
.clrbtn:hover { border-color: var(--red); color: var(--red); }

.flash {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green);
  color: #000;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 3px;
  padding: 12px 28px;
  transition: transform 0.3s ease;
  z-index: 100;
  pointer-events: none;
}
.flash.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="wrap">
  <div class="hdr">
    <div class="hdr-badge">⚽ Season Journal</div>
    <h1>MATVEY FC</h1>
    <div class="hdr-sub">Tournament Tracker</div>
    <div class="divider"><span style="font-size:18px;">⚽</span></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-days">0</div><div class="stat-lbl">Дней</div></div>
    <div class="stat"><div class="stat-val wht" id="s-tours">0</div><div class="stat-lbl">Турниров</div></div>
    <div class="stat"><div class="stat-val gold" id="s-sum">0</div><div class="stat-lbl">Сумма ₽</div></div>
  </div>

  <div class="tabs" id="tabs-bar"></div>

  <div id="pane-rec">
    <div class="card">
      <div class="slabel">Турниры</div>
      <div class="tgrid" id="tgrid"></div>

      <div class="slabel">Дата</div>
      <div class="drow">
        <input class="dinput" id="inp-day" type="number" min="1" max="31" placeholder="ДД">
        <span class="dsep">.</span>
        <input class="dinput" id="inp-month" type="number" min="1" max="12" placeholder="ММ">
      </div>

      <div class="slabel">Сумма за день</div>
      <div class="agrid" id="agrid"></div>
      <div class="mrow">
        <input class="minput" id="inp-manual" type="number" min="0" placeholder="или введи сумму вручную...">
        <button class="madd" id="btn-add-manual">+ ДОБАВИТЬ</button>
      </div>
      <div class="atotal" id="atotal"></div>

      <div class="slabel">Заметка</div>
      <input class="ninput" id="inp-note" type="text" placeholder="Необязательно..." maxlength="80">

      <button class="sbtn" id="btn-submit">＋ ЗАПИСАТЬ ДЕНЬ</button>
    </div>
  </div>

  <div id="pane-calc" style="display:none;">
    <div class="card">
      <div class="slabel">Запросить сумму</div>
      <div class="crow">
        <span class="clbl">С</span>
        <input class="dinput" id="rf-d1" type="number" min="1" max="31" placeholder="ДД">
        <span class="dsep">.</span>
        <input class="dinput" id="rf-m1" type="number" min="1" max="12" placeholder="ММ">
        <span class="clbl" style="margin-left:4px;">ПО</span>
        <input class="dinput" id="rf-d2" type="number" min="1" max="31" placeholder="ДД">
        <span class="dsep">.</span>
        <input class="dinput" id="rf-m2" type="number" min="1" max="12" placeholder="ММ">
      </div>
      <button class="sbtn" style="font-size:18px;padding:13px;" id="btn-calc">ПОСЧИТАТЬ</button>
      <div class="range-result" id="range-result">
        <div class="range-period" id="range-period"></div>
        <div class="range-row">
          <div>
            <div class="range-sum" id="range-sum">0</div>
            <div class="range-lbl">рублей</div>
          </div>
          <div class="range-meta">
            <div class="range-num" id="range-days">0</div>
            <div class="range-lbl">дней</div>
            <div class="range-num wht" id="range-tours">0</div>
            <div class="range-lbl">турниров</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="pane-hist" style="display:none;">
    <div id="hist-list"></div>
    <button class="clrbtn" id="btn-clear">Очистить всё</button>
  </div>
</div>

<div class="flash" id="flash"></div>

<script>
/* ================================================================
   IndexedDB — persistent storage that browsers DON'T auto-clear
   (unlike localStorage which Safari/Chrome wipe after ~7 days)
   ================================================================ */
var DB_NAME = 'MatveyFC';
var DB_VERSION = 1;
var STORE = 'entries';
var db = null;
var entriesCache = [];

function openDB() {
  return new Promise(function(resolve, reject) {
    var req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = function(e) {
      var d = e.target.result;
      if (!d.objectStoreNames.contains(STORE)) {
        d.createObjectStore(STORE, { keyPath: 'id' });
      }
    };
    req.onsuccess = function(e) { db = e.target.result; resolve(db); };
    req.onerror = function(e) { reject(e); };
  });
}

function dbGetAll() {
  return new Promise(function(resolve, reject) {
    var tx = db.transaction(STORE, 'readonly');
    var store = tx.objectStore(STORE);
    var req = store.getAll();
    req.onsuccess = function() { resolve(req.result || []); };
    req.onerror = function(e) { reject(e); };
  });
}

function dbPut(entry) {
  return new Promise(function(resolve, reject) {
    var tx = db.transaction(STORE, 'readwrite');
    var store = tx.objectStore(STORE);
    var req = store.put(entry);
    req.onsuccess = function() { resolve(); };
    req.onerror = function(e) { reject(e); };
  });
}

function dbClearAll() {
  return new Promise(function(resolve, reject) {
    var tx = db.transaction(STORE, 'readwrite');
    var store = tx.objectStore(STORE);
    var req = store.clear();
    req.onsuccess = function() { resolve(); };
    req.onerror = function(e) { reject(e); };
  });
}

/* Migrate old localStorage data → IndexedDB (one-time) */
async function migrateLocalStorage() {
  try {
    var old = localStorage.getItem('matvey_fc_v3');
    if (!old) return;
    var arr = JSON.parse(old);
    if (!arr || !arr.length) return;
    var existing = await dbGetAll();
    if (existing.length > 0) {
      // Already have data in IDB — just delete old key
      localStorage.removeItem('matvey_fc_v3');
      return;
    }
    for (var i = 0; i < arr.length; i++) {
      await dbPut(arr[i]);
    }
    localStorage.removeItem('matvey_fc_v3');
  } catch(e) { /* silent */ }
}

/* ===== INIT ===== */
var selT = {};
var selA = [];

async function init() {
  try {
    await openDB();
    await migrateLocalStorage();
    var all = await dbGetAll();
    // Sort newest first (by id = timestamp)
    all.sort(function(a, b) { return b.id - a.id; });
    entriesCache = all;
  } catch(e) {
    // Fallback to localStorage if IndexedDB unavailable
    try { entriesCache = JSON.parse(localStorage.getItem('matvey_fc_v3') || '[]'); } catch(x) { entriesCache = []; }
  }
  updateStats();
}

init();

/* ===== TABS ===== */
var TABS = [
  {id:'rec',  label:'\u26bd ЗАПИСАТЬ'},
  {id:'calc', label:'\u20bd ПОДСЧЁТ'},
  {id:'hist', label:'\ud83d\udccb ИСТОРИЯ'}
];
var tabsBar = document.getElementById('tabs-bar');
TABS.forEach(function(t, idx) {
  var btn = document.createElement('button');
  btn.className = 'tab' + (idx === 0 ? ' on' : '');
  btn.id = 'tab-' + t.id;
  btn.textContent = t.label;
  btn.addEventListener('click', function(e) { e.preventDefault(); showTab(t.id); });
  tabsBar.appendChild(btn);
});

function showTab(name) {
  TABS.forEach(function(t) {
    document.getElementById('pane-' + t.id).style.display = t.id === name ? 'block' : 'none';
    var btn = document.getElementById('tab-' + t.id);
    if (t.id === name) btn.classList.add('on'); else btn.classList.remove('on');
  });
  if (name === 'hist') renderHist();
}

/* ===== TOURNAMENT BUTTONS ===== */
var tgrid = document.getElementById('tgrid');
for (var n = 1; n <= 8; n++) {
  (function(num) {
    var b = document.createElement('button');
    b.className = 'tbtn';
    b.id = 'tb' + num;
    b.textContent = num;
    b.addEventListener('click', function(e) {
      e.preventDefault();
      if (selT[num]) { delete selT[num]; b.classList.remove('on'); }
      else { selT[num] = true; b.classList.add('on'); }
    });
    tgrid.appendChild(b);
  })(n);
}

/* ===== AMOUNT BUTTONS ===== */
var AMOUNTS = [800, 900, 1000, 1100];
var agrid = document.getElementById('agrid');
for (var ai = 0; ai < AMOUNTS.length; ai++) {
  (function(amt) {
    var b = document.createElement('button');
    b.className = 'abtn';
    b.id = 'ab' + amt;
    b.innerHTML = '<span>' + amt + ' \u20BD</span>';
    b.addEventListener('click', function(e) {
      e.preventDefault();
      selA.push(amt);
      refreshAmounts();
    });
    agrid.appendChild(b);
  })(AMOUNTS[ai]);
}

function refreshAmounts() {
  for (var ai = 0; ai < AMOUNTS.length; ai++) {
    var amt = AMOUNTS[ai];
    var cnt = 0;
    for (var i = 0; i < selA.length; i++) { if (selA[i] === amt) cnt++; }
    var b = document.getElementById('ab' + amt);
    if (cnt > 0) {
      b.classList.add('on');
      b.innerHTML = '<span>' + amt + ' \u20BD</span>' + (cnt > 1 ? '<span class="acnt">\u00d7' + cnt + '</span>' : '');
    } else {
      b.classList.remove('on');
      b.innerHTML = '<span>' + amt + ' \u20BD</span>';
    }
  }
  var total = 0;
  for (var i = 0; i < selA.length; i++) total += selA[i];
  var el = document.getElementById('atotal');
  if (total > 0) {
    el.innerHTML = '\u0418\u0422\u041e\u0413\u041e: <span style="color:var(--gold)">' + total.toLocaleString('ru-RU') + ' \u20BD</span>'
      + ' <button id="btn-reset-amt">\u2715 \u0421\u0411\u0420\u041e\u0421</button>';
    document.getElementById('btn-reset-amt').addEventListener('click', function(e) {
      e.preventDefault();
      selA = [];
      refreshAmounts();
    });
  } else {
    el.innerHTML = '';
  }
}

/* ===== MANUAL ADD ===== */
document.getElementById('btn-add-manual').addEventListener('click', function(e) {
  e.preventDefault();
  addManual();
});
document.getElementById('inp-manual').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addManual();
});

function addManual() {
  var v = parseInt(document.getElementById('inp-manual').value);
  if (!v || v <= 0) { flash('\u0412\u0412\u0415\u0414\u0418 \u0421\u0423\u041c\u041c\u0423'); return; }
  selA.push(v);
  refreshAmounts();
  document.getElementById('inp-manual').value = '';
}

/* ===== SUBMIT ===== */
document.getElementById('btn-submit').addEventListener('click', function(e) {
  e.preventDefault();
  submitEntry();
});

async function submitEntry() {
  var day   = parseInt(document.getElementById('inp-day').value);
  var month = parseInt(document.getElementById('inp-month').value);
  var tours = Object.keys(selT).map(Number);

  if (tours.length === 0) { flash('\u0412\u042b\u0411\u0415\u0420\u0418\u0422\u0415 \u0422\u0423\u0420\u041d\u0418\u0420\u042b'); return; }
  if (selA.length === 0)  { flash('\u0412\u042b\u0411\u0415\u0420\u0418\u0422\u0415 \u0421\u0423\u041c\u041c\u0423'); return; }
  if (!day || !month || day < 1 || day > 31 || month < 1 || month > 12) {
    flash('\u0412\u0412\u0415\u0414\u0418\u0422\u0415 \u0414\u0410\u0422\u0423'); return;
  }

  var total = 0;
  for (var i = 0; i < selA.length; i++) total += selA[i];
  var yr   = new Date().getFullYear();
  var date = pad(day) + '.' + pad(month) + '.' + yr;

  var entry = {
    id: Date.now(),
    date: date,
    tournaments: tours.sort(function(a,b){return a-b;}),
    amounts: selA.slice().sort(function(a,b){return a-b;}),
    amount: total,
    note: document.getElementById('inp-note').value.trim()
  };

  // Save to IndexedDB
  try {
    if (db) { await dbPut(entry); }
    else { /* fallback */ var arr2 = JSON.parse(localStorage.getItem('matvey_fc_v3')||'[]'); arr2.unshift(entry); localStorage.setItem('matvey_fc_v3', JSON.stringify(arr2)); }
  } catch(e) {
    flash('\u041e\u0428\u0418\u0411\u041a\u0410'); return;
  }

  entriesCache.unshift(entry);

  // Reset form
  selT = {};
  selA = [];
  var tbtns = document.querySelectorAll('.tbtn');
  for (var i = 0; i < tbtns.length; i++) tbtns[i].classList.remove('on');
  refreshAmounts();
  document.getElementById('inp-note').value = '';
  document.getElementById('inp-day').value = '';
  document.getElementById('inp-month').value = '';

  updateStats();
  flash('\u0417\u0410\u041f\u0418\u0421\u0410\u041d\u041e!');
}

/* ===== HISTORY ===== */
function renderHist() {
  var list = document.getElementById('hist-list');
  var arr  = entriesCache;
  if (arr.length === 0) {
    list.innerHTML = '<div class="empty"><div class="empty-ico">\u26bd</div><div class="empty-txt">\u041d\u0435\u0442 \u0437\u0430\u043f\u0438\u0441\u0435\u0439</div></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < arr.length; i++) {
    var e = arr[i];
    var tags = '';
    for (var t = 0; t < e.tournaments.length; t++) {
      tags += '<div class="etag">' + e.tournaments[t] + '</div>';
    }
    var amtBreak = (e.amounts && e.amounts.length > 1) ? '<div class="entry-note">' + e.amounts.join(' + ') + ' \u20BD</div>' : '';
    var note = e.note ? '<div class="entry-note">' + e.note + '</div>' : '';
    html += '<div class="entry">'
      + '<div>'
        + '<div class="entry-date">' + e.date + '</div>'
        + '<div class="entry-tags">' + tags + '</div>'
        + amtBreak + note
      + '</div>'
      + '<div>'
        + '<div class="entry-amt">' + e.amount.toLocaleString('ru-RU') + '</div>'
        + '<div class="entry-aml">\u0440\u0443\u0431\u043b\u0435\u0439</div>'
      + '</div>'
    + '</div>';
  }
  list.innerHTML = html;
}

/* ===== CALC ===== */
document.getElementById('btn-calc').addEventListener('click', function(e) {
  e.preventDefault();
  calcRange();
});

function calcRange() {
  var d1 = parseInt(document.getElementById('rf-d1').value);
  var m1 = parseInt(document.getElementById('rf-m1').value);
  var d2 = parseInt(document.getElementById('rf-d2').value);
  var m2 = parseInt(document.getElementById('rf-m2').value);

  if (!d1||!m1||!d2||!m2||d1<1||d1>31||m1<1||m1>12||d2<1||d2>31||m2<1||m2>12) {
    flash('\u0412\u0412\u0415\u0414\u0418\u0422\u0415 \u0414\u0418\u0410\u041f\u0410\u0417\u041e\u041d'); return;
  }
  var yr   = new Date().getFullYear();
  var from = new Date(yr, m1-1, d1);
  var to   = new Date(yr, m2-1, d2);
  if (to < from) { flash('\u041d\u0415\u0412\u0415\u0420\u041d\u042b\u0419 \u0414\u0418\u0410\u041f\u0410\u0417\u041e\u041d'); return; }

  var arr = entriesCache;
  var filtered = [];
  for (var i = 0; i < arr.length; i++) {
    var p = arr[i].date.split('.');
    var d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
    if (d >= from && d <= to) filtered.push(arr[i]);
  }

  var sum = 0, tours = 0;
  for (var i = 0; i < filtered.length; i++) {
    sum   += filtered[i].amount;
    tours += filtered[i].tournaments.length;
  }

  document.getElementById('range-period').textContent = pad(d1)+'.'+pad(m1)+' \u2014 '+pad(d2)+'.'+pad(m2)+'.'+yr;
  document.getElementById('range-sum').textContent    = sum.toLocaleString('ru-RU');
  document.getElementById('range-days').textContent   = filtered.length;
  document.getElementById('range-tours').textContent  = tours;
  document.getElementById('range-result').style.display = 'block';
}

/* ===== CLEAR ===== */
document.getElementById('btn-clear').addEventListener('click', async function(e) {
  e.preventDefault();
  if (confirm('\u0423\u0434\u0430\u043b\u0438\u0442\u044c \u0432\u0441\u044e \u0438\u0441\u0442\u043e\u0440\u0438\u044e?')) {
    entriesCache = [];
    try { if (db) await dbClearAll(); } catch(x) {}
    try { localStorage.removeItem('matvey_fc_v3'); } catch(x) {}
    renderHist();
    updateStats();
  }
});

/* ===== UTILS ===== */
function updateStats() {
  var arr = entriesCache;
  var days = arr.length, tours = 0, sum = 0;
  for (var i = 0; i < arr.length; i++) {
    tours += arr[i].tournaments.length;
    sum   += arr[i].amount;
  }
  document.getElementById('s-days').textContent  = days;
  document.getElementById('s-tours').textContent = tours;
  document.getElementById('s-sum').textContent   = sum.toLocaleString('ru-RU');
}

function pad(n) { return n < 10 ? '0' + n : '' + n; }

function flash(msg) {
  var el = document.getElementById('flash');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2000);
}
</script>
